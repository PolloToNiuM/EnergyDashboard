services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: energy_scope
      POSTGRES_USER: energy_scope
      POSTGRES_PASSWORD: energy_scope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_scope -d energy_scope"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      DATABASE_URL: "postgresql+psycopg://energy_scope:energy_scope@postgres:5432/energy_scope"
      RTE_BASIC_AUTH: "${RTE_BASIC_AUTH:-}"
      WEATHER_LOCATIONS: "${WEATHER_LOCATIONS:-Lille:50.6292:3.0573,Paris:48.8566:2.3522,Strasbourg:48.5734:7.7521,Lyon:45.7640:4.8357,Marseille:43.2965:5.3698,Toulouse:43.6047:1.4442,Bordeaux:44.8378:-0.5792,Nantes:47.2184:-1.5536,Brest:48.3904:-4.4861}"
      WEATHER_AVERAGE_ZONE: "${WEATHER_AVERAGE_ZONE:-France}"
      WEATHER_TIMEZONE: "${WEATHER_TIMEZONE:-Europe/Paris}"
      WEATHER_HOURLY_VARIABLES: "${WEATHER_HOURLY_VARIABLES:-temperature_2m,shortwave_radiation,wind_speed_100m}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      SQLALCHEMY_LOG_LEVEL: "${SQLALCHEMY_LOG_LEVEL:-WARNING}"
      UVICORN_ACCESS_LOG_LEVEL: "${UVICORN_ACCESS_LOG_LEVEL:-WARNING}"
      HTTPX_LOG_LEVEL: "${HTTPX_LOG_LEVEL:-WARNING}"
      HTTPCORE_LOG_LEVEL: "${HTTPCORE_LOG_LEVEL:-WARNING}"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:8000}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  postgres_data:
