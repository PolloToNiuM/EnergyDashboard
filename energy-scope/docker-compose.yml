version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: energy_scope
      POSTGRES_USER: energy_scope
      POSTGRES_PASSWORD: energy_scope
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://energy_scope:energy_scope@postgres:5432/energy_scope
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
